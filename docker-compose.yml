services:
  # === Qdrant ===
  qdrant:
    image: qdrant/qdrant:v1.7.3
    container_name: qdrant
    ports:
      - "6333:6333"   # REST gRPC API
      - "6334:6334"   # Optional Web UI
    volumes:
      - qdrant_data:/qdrant/storage

  # === Ollama ===
  ollama:
    build:
      context: ./ollama  # This folder has Dockerfile, entrypoint.sh, Modelfile
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_ORIGINS=*    
      - OLLAMA_HOST=0.0.0.0
    dns:
      - 8.8.8.8
      - 1.1.1.1  

  # === Python App (FastAPI + Streamlit) ===
  rag-app:
    build: .
    container_name: rag-app
    ports:
      - "8000:8000"  # FastAPI
      - "8501:8501"  # Streamlit
    depends_on:
      - qdrant
      - ollama
    command: >
      sh -c "
      (
        if [ ! -d data/arxiv_raw ] || [ \"$(find data/arxiv_raw -type f | wc -l)\" -eq 0 ]; then
          echo 'Raw data missing or empty, running download_data.py'
          python scripts/download_data.py
        else
          echo 'Raw data already exists, skipping download_data.py'
        fi
        python scripts/ingest_arxiv.py data/arxiv-dataset.json
      ) &
      uvicorn app:app --host 0.0.0.0 --port 8000 &
      streamlit run ui.py --server.port 8501 --server.address 0.0.0.0
      "
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - OLLAMA_HOST=ollama
      - OLLAMA_PORT=11434
      # Optional: set the same secret for API + Streamlit when exposing ports publicly
      # - RAG_API_KEY=change-me
      # - RAG_SCORE_HIGH=0.48
      # - RAG_SCORE_LOW=0.30
      - ARXIV_RAW_URL=
      - ARXIV_HF_REPO=permutans/arxiv-papers-by-subject
      - ARXIV_DATASET_PATH=data/arxiv-dataset.json
      - ARXIV_SAMPLE_SIZE=10000
    volumes:
      - ./hf_cache:/app/.cache/huggingface

volumes:
  qdrant_data:
  ollama_data:




# This says:
# “Run three containers → Qdrant, Ollama, and my custom app image (built from the Dockerfile). Wire them together. Open ports.